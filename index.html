<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo 魔方训练</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f3f5;}
.header{
    position:sticky;top:0;
    background:#224294;color:#fff;
    padding:12px;text-align:center;font-size:18px;
}

.container{padding:12px;}

.card{
    background:#fff;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
}

input{padding:8px;border:1px solid #ddd;border-radius:6px;width:45%;}
button{padding:8px 12px;border:none;border-radius:6px;background:#224294;color:#fff;}
button:active{transform:scale(0.95);}

.switch{
    display:flex;gap:10px;margin-bottom:10px;
}
.switch button.active{background:#e53935;}

.list-item{
    display:flex;justify-content:space-between;
    padding:6px 0;border-bottom:1px solid #eee;
}

.del{background:#e53935;}

canvas{width:100%;height:220px;}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    text-align:center;
}
.day{
    background:#fff;
    padding:6px;
    border-radius:6px;
    font-size:12px;
}
.day.has{background:#e8f0ff;}
.day:active{transform:scale(0.95);}

.toast{
    position:fixed;bottom:40px;left:50%;
    transform:translateX(-50%);
    background:#000;color:#fff;
    padding:10px 16px;border-radius:20px;
    opacity:0;transition:.3s;
}
.toast.show{opacity:0.85;}
</style>
</head>

<body>

<div class="header">Leo 魔方训练</div>

<div class="container">

<div class="card">
<input type="date" id="date">
<input type="number" id="sec" placeholder="秒">
<button onclick="add()">记录</button>
</div>

<div class="card">
<div id="best"></div>
</div>

<div class="card">
<div class="switch">
<button id="avgBtn" class="active" onclick="setMode('avg')">平均</button>
<button id="bestBtn" onclick="setMode('best')">最快</button>
</div>
<canvas id="cvs"></canvas>
</div>

<div class="card">
<h3>日历</h3>
<div id="cal" class="calendar"></div>
</div>

<div class="card">
<h3>记录</h3>
<div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY="leo_cube_pro";
let data=[];
let mode="avg";

function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.classList.add("show");
 setTimeout(()=>t.classList.remove("show"),1500);
}

function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function load(){
 let s=localStorage.getItem(KEY);
 if(s) data=JSON.parse(s);
}

function add(){
 document.activeElement.blur();
 let d=date.value;
 let s=parseFloat(sec.value);
 if(!d||!s){toast("输入错误");return;}
 data.push({date:d,sec:s});
 save(); sec.value="";
 render(); draw(); renderCal();
}

function del(i){
 data.splice(i,1);
 save(); render(); draw(); renderCal();
}

function setMode(m){
 mode=m;
 avgBtn.classList.toggle("active",m==="avg");
 bestBtn.classList.toggle("active",m==="best");
 draw(); renderCal();
}

function group(){
 let m={};
 data.forEach(x=>{
   if(!m[x.date]) m[x.date]=[];
   m[x.date].push(x.sec);
 });
 let res=[];
 for(let d in m){
   let arr=m[d];
   let avg=arr.reduce((a,b)=>a+b,0)/arr.length;
   let best=Math.min(...arr);
   res.push({date:d,avg,best});
 }
 return res.sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function render(){
 list.innerHTML=data.map((x,i)=>`
  <div class="list-item">
   <span>${x.date} - ${x.sec}s</span>
   <button class="del" onclick="del(${i})">删</button>
  </div>`).join("");

 if(data.length){
   let best=Math.min(...data.map(x=>x.sec));
   bestDiv=`🏆 历史最佳：${best}s`;
 }else bestDiv="暂无数据";

 document.getElementById("best").innerText=bestDiv;
}

function draw(){
 requestAnimationFrame(()=>{
  let c=cvs;
  c.width=c.parentNode.clientWidth;
  c.height=220;
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let arr=group();
  if(!arr.length) return;

  let vals=arr.map(x=>mode==="avg"?x.avg:x.best);

  let max=Math.max(...vals);
  let min=Math.min(...vals);

  // 👉 防止数值一样
  if(max===min){
    max+=1;
    min-=1;
  }

  let pad=40;
  let step=(c.width-pad*2)/(arr.length-1||1);

  // 👉 坐标轴
  ctx.strokeStyle="#ccc";
  ctx.beginPath();
  ctx.moveTo(pad,10);
  ctx.lineTo(pad,c.height-pad);
  ctx.lineTo(c.width-10,c.height-pad);
  ctx.stroke();

  // 👉 画线
  ctx.strokeStyle="#224294";
  ctx.lineWidth=2;
  ctx.beginPath();

  let points=[];

  arr.forEach((x,i)=>{
    let v=mode==="avg"?x.avg:x.best;
    let px=pad+i*step;
    let py=c.height-pad-(v-min)/(max-min)*(c.height-pad*2);

    points.push({px,py,v,date:x.date});

    i?ctx.lineTo(px,py):ctx.moveTo(px,py);
  });

  ctx.stroke();

  // 👉 关键：设置字体（必须）
  ctx.fillStyle="#000";
  ctx.font="12px Arial";
  ctx.textAlign="center";

  // 👉 点 + 数值 + 日期
  points.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.px,p.py,5,0,Math.PI*2);
    ctx.fill();

    // 数值（自动避免出界）
    let yText = p.py - 10;
    if(yText < 10) yText = p.py + 15;

    ctx.fillText(p.v.toFixed(2)+"s", p.px, yText);

    // 日期（只显示 日）
    let day = p.date.split("-")[2];
    ctx.fillText(day, p.px, c.height-pad+15);
  });
 });
}

function renderCal(){
 let now=new Date();
 let y=now.getFullYear();
 let m=now.getMonth();

 let first=new Date(y,m,1).getDay();
 let days=new Date(y,m+1,0).getDate();

 let arr=group();
 let map={};
 arr.forEach(x=>{
   map[x.date]=mode==="avg"?x.avg.toFixed(1):x.best;
 });

 let html="";
 for(let i=0;i<first;i++) html+="<div></div>";

 for(let d=1;d<=days;d++){
   let dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
   let val=map[dateStr];
   html+=`<div class="day ${val?"has":""}" onclick="showDay('${dateStr}')">
     ${d}<br>${val?val+"s":""}
   </div>`;
 }

 cal.innerHTML=html;
}

function showDay(d){
 let arr=data.filter(x=>x.date===d);
 if(!arr.length){toast("无记录");return;}
 toast(d+"："+arr.length+"次");
}

window.onload=function(){
 load();
 let d=new Date();
 date.value=d.toISOString().split("T")[0];
 render(); draw(); renderCal();
}
</script>

</body>
</html>
